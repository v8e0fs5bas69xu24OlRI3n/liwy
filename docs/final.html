<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Domain For Sale</title>

</head>

<body>

<div class="wrapper">

<div class="hero">

<div class="domain" id="domain"></div>

<div class="subtitle" id="subtitle"></div>

</div>

<div class="card">

<label class="option">

<div class="left">

<input
type="radio"
name="purchase"
value="buy"
checked>

<div>

<div class="boxtext">

Buy now

</div>

</div>

</div>

<div class="price" id="buyPrice"></div>

</label>

<label class="option">

<div class="left">

<input
type="radio"
name="purchase"
value="lease">

<div>

<div class="boxtext">

Lease to own

</div>

</div>

</div>

<div style="text-align:right;">

<div class="price" id="leasePrice"></div>

<span class="small" id="leaseText"></span>

</div>

</label>

<div class="payments">

<h3>

Accepted payments

</h3>
    <img
    id="paymentImage"
    class="payment-image"
    alt="Payment methods"
    title="Payment methods">
</div>

<button id="continue"></button>

<div class="footer" id="escrow"></div>

</div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
