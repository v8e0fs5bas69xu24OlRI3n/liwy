<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Premium domain for sale">

    <meta
        name="theme-color"
        content="#3b4dff">

    <title>Domain For Sale</title>

    <link
        rel="icon"
        href="favicon.ico">

    <!-- Google Font -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="test.css">

</head>

<body>

<div class="background">

    <div class="blob blob-one"></div>

    <div class="blob blob-two"></div>

</div>



<main class="page">

    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="glass">

            <img
                id="logo"
                class="logo"
                src=""
                alt="Logo">

            <p
                id="heroTitle"
                class="hero-title">
            </p>

            <h1
                id="domain"
                class="domain">
            </h1>

            <div
                id="features"
                class="features">
            </div>

        </div>

    </section>


    <!-- ================= PURCHASE CARD ================= -->

    <section class="purchase-card">

        <form id="purchaseForm">

</form>



        <!-- Payment Methods -->

        <section class="payments">

            <h3>

                Accepted payments

            </h3>

            <div
                id="paymentIcons"
                class="payment-icons">
            </div>

        </section>



        <!-- Continue -->

        <button
            id="continueButton"
            type="button"
            disabled>

            <span
                id="buttonText">
                Continue
            </span>

            <svg
                width="22"
                height="22"
                viewBox="0 0 24 24">

                <path
                    d="M5 12H19M13 6L19 12L13 18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>

            </svg>

        </button>



        <!-- Trust -->

        <section class="trust">

            <div class="trust-header">

                🔒

                <span
                    id="trustHeading">
                </span>

            </div>

            <div
                id="trustItems"
                class="trust-items">
            </div>

        </section>



        <!-- Footer -->

        <footer
            id="footer"
            class="footer">
        </footer>

    </section>

</main>



<script src="config.js"></script>

<script src="test.js"></script>

</body>

  </html>
